<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded square -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#brandGradient)"/>
  
  <!-- Brain icon (adapted from lucide-react brain icon) -->
  <g transform="translate(50, 50)" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M -5,-18 C -12,-18 -18,-12 -18,-5 C -18,2 -12,8 -5,8" opacity="0.95"/>
    <circle cx="-10" cy="-10" r="5" opacity="0.9"/>
    <circle cx="-12" cy="0" r="4" opacity="0.85"/>
    
    <!-- Right hemisphere -->
    <path d="M 5,-18 C 12,-18 18,-12 18,-5 C 18,2 12,8 5,8" opacity="0.95"/>
    <circle cx="10" cy="-10" r="5" opacity="0.9"/>
    <circle cx="12" cy="0" r="4" opacity="0.85"/>
    
    <!-- Bottom connection -->
    <path d="M -5,8 Q 0,12 5,8" opacity="0.9"/>
    
    <!-- Neural patterns -->
    <line x1="-5" y1="-8" x2="-8" y2="-2" opacity="0.7" stroke-width="2"/>
    <line x1="5" y1="-8" x2="8" y2="-2" opacity="0.7" stroke-width="2"/>
    <circle cx="0" cy="-12" r="2" fill="white" opacity="0.9"/>
  </g>
</svg>

