name: Deploy Backend to Azure Container Apps

on:
  push:
    branches: [ main ]
    paths:
      - 'Backend/**'
      - '.github/workflows/azure-container-app.yml'
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
  CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  IMAGE_NAME: medha-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

    - name: Build and push Docker image
      working-directory: ./Backend
      run: |
        docker build . -t ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker build . -t ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    - name: Deploy to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        containerAppName: ${{ env.CONTAINER_APP_NAME }}
        resourceGroup: ${{ env.RESOURCE_GROUP }}
        imageToDeploy: ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        environmentVariables: |
          MONGODB_URI=secretref:mongodb-uri
          MONGO_URI=secretref:mongodb-uri
          GROQ_API_KEY=secretref:groq-api-key
          GROQ_MODEL=llama-3.3-70b-versatile
          GEMINI_API_KEY=secretref:gemini-api-key
          GOOGLE_API_KEY=secretref:gemini-api-key
          GEMINI_MODEL=gemini-2.5-flash
          JWT_SECRET_KEY=secretref:jwt-secret-key
          JWT_ALGORITHM=HS256
          JWT_EXPIRATION_HOURS=72
          SMTP_FROM_EMAIL=secretref:smtp-from-email
          SMTP_FROM_NAME=Medha.ai
          GMAIL_APP_PASSWORD=secretref:gmail-app-password
          HUGGINGFACE_HUB_TOKEN=secretref:huggingface-token

    - name: Logout from Azure
      run: az logout

